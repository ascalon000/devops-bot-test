name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  quality-check-and-notify:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'feature/ticket-')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pylint

    - name: Run Python quality checks

      run: |
        pylint src/*.py --exit-zero

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        # –Ъ–ї—О—З –њ—А–Њ–µ–Ї—В–∞ = —О–Ј–µ—А–љ–µ–є–Љ Github
        projectKey: ${{ github.repository_owner }}
        # –Ю—А–≥–∞–љ–Є–Ј–∞—Ж–Є—П = —О–Ј–µ—А–љ–µ–є–Љ GitHub
        organization: ${{ github.repository_owner }}

    - name: Create report
      run: |
        mkdir -p reports
        echo "Quality Check Report" > reports/quality_report.txt
        echo "====================" >> reports/quality_report.txt
        echo "Branch: ${{ github.head_ref }}" >> reports/quality_report.txt
        echo "Commit: ${{ github.sha }}" >> reports/quality_report.txt
        echo "Status: All checks passed" >> reports/quality_report.txt
        date >> reports/quality_report.txt

    - name: Upload report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: quality-report
        path: reports/
        retention-days: 30

    - name: Generate version and release info
      id: release_info
      run: |
        VERSION=$(date +'%Y.%m.%d-%H%M%S')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "pr_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
        echo "repo_url=${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_OUTPUT
        echo "owner=${{ github.repository_owner }}" >> $GITHUB_OUTPUT
        echo "repo_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
        echo "docker_full_name=${{ github.repository_owner }}/${{ github.event.repository.name }}:v$VERSION" >> $GITHUB_OUTPUT
        echo "merge_date=$(date +'%Y.%m.%d %H:%M:%S')" >> $GITHUB_OUTPUT

    - name: Send Telegram Notification
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          *–Э–Њ–≤—Л–є –≤—Л–њ—Г—Б–Ї –Є–Ј–Љ–µ–љ–µ–љ–Є–є*
          *–Я—А–Њ–µ–Ї—В:* `${{ github.repository }}`
          *–Т–µ—А—Б–Є—П:* `${{ steps.release_info.outputs.tag }}`
          *–Ф–∞—В–∞ –Є –≤—А–µ–Љ—П:* `${{ steps.release_info.outputs.merge_date }}`
          *–Т–µ—В–Ї–∞:* `${{ github.head_ref }} вЖТ dev`
          *–°—Б—Л–ї–Ї–∞ –љ–∞ –Љ–µ—А–ґ:* [Pull Request](${{ steps.release_info.outputs.pr_url }})
          
          *–Ш–љ—Д–Њ—А–Љ–∞—Ж–Є—П –Њ Git-—А–µ–њ–Њ–Ј–Є—В–Њ—А–Є–Є*
          [–Ю—В–Ї—А—Л—В—М](${{ steps.release_info.outputs.repo_url }})
          *GIT TAG:* `${{ steps.release_info.outputs.tag }}`
          
          *–Ш–љ—Д–Њ—А–Љ–∞—Ж–Є—П –Њ Docker-—А–µ–њ–Њ–Ј–Є—В–Њ—А–Є–Є*
          *–Т–ї–∞–і–µ–ї–µ—Ж:* `${{ steps.release_info.outputs.owner }}`
          *–Э–∞–Ј–≤–∞–љ–Є–µ:* `${{ steps.release_info.outputs.repo_name }}`
          *–Я–Њ–ї–љ–Њ–µ –Є–Љ—П:* `${{ steps.release_info.outputs.docker_full_name }}`

    - name: Run tests
      run: |
        pip install pytest-asyncio
        pytest tests/ -v --tb=short --cov=src --cov-report=xml

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_PROJECT_KEY: ${{ github.repository_owner }}
        SONAR_ORGANIZATION: ${{ github.repository_owner }}
    
