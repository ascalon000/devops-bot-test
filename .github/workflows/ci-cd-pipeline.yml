name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  quality-check-and-notify:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'feature/ticket-')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pylint

    - name: Run Python quality checks

      run: |
        pylint src/*.py --exit-zero

    # - name: Generate sonar-project.properties
    #   run: |
    #     cat > sonar-project.properties << EOF
    #     sonar.projectKey=${{ github.repository_owner }}
    #     sonar.organization=${{ github.repository_owner }}
    #     sonar.sources=.
    #     sonar.sourceEncoding=UTF-8
    #     sonar.python.version=3.11
    #     sonar.exclusions=**/.venv/**
    #     EOF

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    - name: Create report
      run: |
        mkdir -p reports
        echo "Quality Check Report" > reports/quality_report.txt
        echo "====================" >> reports/quality_report.txt
        echo "Branch: ${{ github.head_ref }}" >> reports/quality_report.txt
        echo "Commit: ${{ github.sha }}" >> reports/quality_report.txt
        echo "Status: All checks passed" >> reports/quality_report.txt
        date >> reports/quality_report.txt

    - name: Upload report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: quality-report
        path: reports/
        retention-days: 30

    - name: Generate version and release info
      id: release_info
      HEAD_REF: ${{ github.head_ref }}
      REPO: ${{ github.repository }}
      OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      run: |
        VERSION=$(date +'%Y.%m.%d-%H%M%S')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "pr_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
        echo "repo_url=${{ github.server_url }}/$REPO" >> $GITHUB_OUTPUT
        echo "owner=$OWNER" >> $GITHUB_OUTPUT
        echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
        echo "docker_full_name=$OWNER/$REPO_NAME:v$VERSION" >> $GITHUB_OUTPUT
        echo "merge_date=$(date +'%Y.%m.%d %H:%M:%S')" >> $GITHUB_OUTPUT
        echo "branch=$HEAD_REF" >> $GITHUB_OUTPUT

    - name: Send Telegram Notification
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          *Новый выпуск изменений*
          *Проект:* `${{ github.repository }}`
          *Версия:* `${{ steps.release_info.outputs.tag }}`
          *Дата и время:* `${{ steps.release_info.outputs.merge_date }}`
          *Ветка:* `${{ github.head_ref }} → main`
          *Ссылка на мерж:* [Pull Request](${{ steps.release_info.outputs.pr_url }})
          
          *Информация о Git-репозитории*
          [Открыть](${{ steps.release_info.outputs.repo_url }})
          *GIT TAG:* `${{ steps.release_info.outputs.tag }}`
          
          *Информация о Docker-репозитории*
          *Владелец:* `${{ steps.release_info.outputs.owner }}`
          *Название:* `${{ steps.release_info.outputs.repo_name }}`
          *Полное имя:* `${{ steps.release_info.outputs.docker_full_name }}`
